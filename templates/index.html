<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Drowsiness Detection in Drivers</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --side: #1e293b; --accent: #38bdf8; --danger: #ef4444; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; height: 100vh; }
        
        .sidebar { width: 260px; background: var(--side); border-right: 1px solid rgba(255,255,255,0.1); padding: 25px; display: flex; flex-direction: column; }
        .project-title { color: var(--accent); font-size: 1.1rem; font-weight: 700; line-height: 1.4; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 1px; }
        
        .system-card { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .status-indicator { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: #4ade80; margin-bottom: 10px; }
        .dot { width: 8px; height: 8px; background: #4ade80; border-radius: 50%; box-shadow: 0 0 10px #4ade80; }

        .main { flex: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        .video-box { width: 100%; max-width: 800px; border-radius: 24px; border: 4px solid #334155; background: #000; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); position: relative; }
        .video-box img { width: 100%; display: block; }
        
        .right { width: 320px; padding: 40px 30px; background: rgba(15, 23, 42, 0.5); border-left: 1px solid rgba(255,255,255,0.05); }
        .stat { background: #1e293b; padding: 20px; border-radius: 16px; margin-bottom: 20px; border-left: 4px solid var(--accent); }
        .stat-label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        .stat-val { font-family: 'JetBrains Mono'; font-size: 1.6rem; margin-top: 5px; }

        #alert-box { display: none; background: var(--danger); padding: 15px; border-radius: 12px; color: white; text-align: center; font-weight: 700; position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 80%; z-index: 100; box-shadow: 0 10px 15px rgba(239, 68, 68, 0.4); }
        
        .chart-container { background: #1e293b; padding: 15px; border-radius: 16px; height: 220px; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="project-title">Drowsiness Detection in Drivers</div>
        
        <div class="system-card">
            <div class="status-indicator"><div class="dot"></div> System Active</div>
            <div style="font-size: 0.75rem; color: #64748b;">Monitoring biometrics for fatigue and ocular stress via 68-point landmark analysis.</div>
        </div>

        <div style="margin-top: auto; font-size: 0.7rem; color: #475569;">
            AI PROTOTYPE v1.2.0<br>Powered by Dlib & OpenCV
        </div>
    </div>

    <div class="main">
        <div class="video-box">
            <div id="alert-box">⚠️ DROWSINESS DETECTED ⚠️</div>
            <img src="{{ url_for('video_feed') }}">
        </div>
    </div>

    <div class="right">
        <div class="stat">
            <div class="stat-label">Eye Ratio (EAR)</div>
            <div class="stat-val" id="ear-text">0.000</div>
        </div>
        <div class="stat" style="border-left-color: #fbbf24;">
            <div class="stat-label">Mouth Ratio (MAR)</div>
            <div class="stat-val" id="mar-text">0.000</div>
        </div>
        <div class="chart-container">
            <canvas id="liveChart"></canvas>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('liveChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels: Array(20).fill(''), datasets: [{ data: Array(20).fill(0.3), borderColor: '#38bdf8', fill: true, backgroundColor: 'rgba(56, 189, 248, 0.1)', tension: 0.4, pointRadius: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { min: 0.1, max: 0.6, grid: { color: 'rgba(255,255,255,0.05)' } }, x: { display: false } }, plugins: { legend: { display: false } } }
        });

        setInterval(() => {
            fetch('/get_data').then(r => r.json()).then(data => {
                document.getElementById('ear-text').innerText = data.ear.toFixed(3);
                document.getElementById('mar-text').innerText = data.mar.toFixed(3);
                chart.data.datasets[0].data.shift();
                chart.data.datasets[0].data.push(data.ear);
                chart.update('none');
                document.getElementById('alert-box').style.display = data.alarm ? 'block' : 'none';
            });
        }, 200);
    </script>
</body>
</html>
